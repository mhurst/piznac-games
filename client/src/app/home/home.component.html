<div class="home-container">
  <div class="home-content">
    <div class="welcome-card">
      <h2>Welcome to Piznac Games!</h2>
      <p>Your destination for classic games with friends or solo.</p>

      <div class="quick-actions">
        <button mat-raised-button color="primary" routerLink="/multiplayer">
          <mat-icon>groups</mat-icon>
          Play Multiplayer
        </button>
        <button mat-raised-button color="accent" routerLink="/singleplayer">
          <mat-icon>person</mat-icon>
          Play Single Player
        </button>
      </div>
    </div>

    <div class="recent-section">
      <h3>Recent Games</h3>

      @if (recent.length === 0) {
        <p class="empty-hint">No recent games yet — jump in and play!</p>
      } @else {
        <div class="recent-list">
          @for (game of recent; track game.playedAt) {
            <button class="recent-card" (click)="playGame(game)">
              <div class="game-icon">
                <mat-icon>{{ game.icon }}</mat-icon>
              </div>
              <div class="game-name">{{ game.name }}</div>
              <div class="game-meta">
                <span class="mode-badge" [class.mp]="game.mode === 'mp'">
                  {{ game.mode === 'sp' ? 'Solo' : 'Multi' }}
                </span>
                <span class="time-ago">{{ timeAgo(game.playedAt) }}</span>
              </div>
            </button>
          }
        </div>
      }
    </div>
  </div>
</div>
